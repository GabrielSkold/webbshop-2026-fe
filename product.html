<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product</title>
    <link rel="stylesheet" href="style.css">
    <script src="src/scripts/product.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header class="site-header">
      <script src="./src/scripts/header.js"></script>
    </header>
    <main class="main-content">
        <section id="product-detail">
            <div class="product-detail__image"></div>
            <div class="product-detail__info">
            <h1>Product name</h1>
            <p>Price</p>
            <div id="product-status"></div>
            <div id="countdown"></div>
            <div id="size-selector"></div>
            <button id="addToCartBtn">Add to cart</button>
            </div>
        </section>
    </main>
    <footer class="site-footer">
      <script src="./src/scripts/footer.js"></script>
    </footer>
</body>
</html>
