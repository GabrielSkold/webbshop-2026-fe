<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Hakim Livs</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="overheader">
        <a href="index.html" class="logo">SOLE SEARCH <i class="fa-brands fa-tiktok"></i></a>
        <div class="div-links">
          <div class="div-searchbar">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
            <input id="search-bar" placeholder="Search" />
          </div>
          <ul class="nav-links">
            <li><a href="shoppingcart.html"><i class="fa-solid fa-cart-shopping"></i></a></li>
            <li><a href="loginpage.html"><i class="fa-solid fa-user"></i></a></li>
            <li><a href="admin.html">Admin</a></li>
          </ul>
          <button class="hamburgermenu"><i class="fa-solid fa-bars"></i></button>
        </div>
      </nav>
      <nav class="underheader">
        <ul class="brand-links">
          <li><a href="products.html">All products</a></li>
          <li><a href="products.html">Adidas</a></li>
          <li><a href="products.html">New Balance</a></li>
          <li><a href="products.html">Converse</a></li>
          <li><a href="products.html">Vans</a></li>
          <li><a href="products.html">Reebok</a></li>
        </ul>
      </nav>
    </header>

    <main class="admin-main">
      <h1>Admin – Create Product</h1>

      <form id="createProductForm" class="admin-form">
        <div class="admin-form-row">
          <label for="name">Name</label>
          <input type="text" id="name" required />
        </div>
        <div class="admin-form-row">
          <label for="price">Price</label>
          <input type="number" id="price" step="0.01" min="0" required />
        </div>
        <div class="admin-form-row">
          <label for="stock">Stock</label>
          <input type="number" id="stock" min="0" required />
        </div>
        <div class="admin-form-row">
          <label for="image">Image URL</label>
          <input type="url" id="image" required />
        </div>
        <div class="admin-form-row">
          <label for="slug">Slug</label>
          <input type="text" id="slug" required placeholder="e.g. organic-tomatoes" />
        </div>
        <button type="submit">Create Product</button>
      </form>

      <h2>Products</h2>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Slug</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <tr><td colspan="4">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

    <script type="module" src="./src/scripts/admin.js"></script>
  </body>
</html>
