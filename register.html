<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Hakim Livs</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>

    <!-- HEADER -->
    <header class="site-header">
      <script src="./src/scripts/header.js"></script>
    </header>

    <!-- MAIN CONTENT -->
    <main class="register-main">
      <h1>Register</h1>
      <div id="register-container" class="register-wrapper">
        <form id="registerForm" class="register-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required />
          </div>
          <button type="submit">Register</button>
        </form>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <script src="./src/scripts/footer.js"></script>
    </footer>

    <script type="module" src="./src/scripts/register.js"></script>
  </body>
</html>
