<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Us - Sole Search</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
  </head>
  <body>

    <!-- HEADER -->
    <header class="site-header">
      <script src="./src/scripts/header.js"></script>
    </header>

    <!-- MAIN CONTENT -->
    <main class="news-main">
      <h1 id="news-h1">ABOUT US</h1>
        <div id="news-box">
            <p>We are a team of Sole Searchers, working hard to build this site for you.</p>
            <p>Please rate and review!</p>
        </div>

      <div class="teams-wrapper">
        
        <section class="team-section">
          <h2 class="team-heading">FRONTEND TEAM</h2>
          <div class="team-grid">
            <div class="team-member">
              <div class="team-card">
                <img src="/public/team-frontend-1.jpg" alt="Frontend team member" class="team-photo" />
              </div>
              <p class="team-name">Gabriel</p>
            </div>
            <div class="team-member">
              <div class="team-card team-card--placeholder"></div>
              <p class="team-name">Erik</p>
            </div>
            <div class="team-member">
              <div class="team-card team-card--placeholder"></div>
              <p class="team-name">Felix</p>
            </div>
          </div>
        </section>

        <section class="team-section">
          <h2 class="team-heading">BACKEND TEAM</h2>
          <div class="team-grid">
            <div class="team-member">
              <div class="team-card">
                <img src="/public/team-backend-1.png" alt="Backend team member" class="team-photo" />
              </div>
              <p class="team-name">David</p>
            </div>
            <div class="team-member">
              <div class="team-card">
                <img src="/public/team-backend-2.png" alt="Backend team member" class="team-photo" />
              </div>
              <p class="team-name">Henry</p>
            </div>
            <div class="team-member">
              <div class="team-card">
                <img src="/public/team-backend-3.jpg" alt="Backend team member" class="team-photo" />
              </div>
              <p class="team-name">Esteban</p>
            </div>
          </div>
        </section>

      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <script src="./src/scripts/footer.js"></script>
    </footer>

    <!-- PAGE-SPECIFIC JAVASCRIPT -->

  </body>
</html>
